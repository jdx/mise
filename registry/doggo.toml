backends = [
  { full = "github:mr-karan/doggo", options = { asset_pattern = "doggo-{{ os(macos='darwin') }}-{{ arch(x64='x86_64', arm64='aarch64', x86='i386') }}{% if os() == 'windows' %}.zip{% else %}.tar.gz{% endif %}" } },
