name: npm-publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (no actual publish)"
        required: false
        default: true
        type: boolean
      version:
        description: "Version to publish (e.g., v2026.1.1). Defaults to latest release."
        required: false
        type: string

concurrency:
  group: npm-publish-${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}

env:
  DRY_RUN: ${{ github.event_name == 'release' && '0' || (inputs.dry_run && '1' || '0') }}

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    if: |
      (github.event_name == 'release' &&
       startsWith(github.event.release.tag_name, 'v') &&
       !github.event.release.prerelease) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download release artifacts
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="$(./scripts/get-version.sh)"
          fi
          mkdir -p "releases/$VERSION"

          # Download release artifacts from GitHub release
          gh release download "$VERSION" \
            --repo ${{ github.repository }} \
            --dir "releases/$VERSION" \
            --pattern "mise-*.tar.gz" \
            --pattern "mise-*.tar.xz" || {
              echo "Failed to download release artifacts"
              exit 1
            }

          # Also download to releases/ directory for compatibility
          cp "releases/$VERSION"/mise-*.tar.gz releases/ || true
          cp "releases/$VERSION"/mise-*.tar.xz releases/ || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        # `actions/setup-node` writes the npm registry URL and `NODE_AUTH_TOKEN`
        # auth into ~/.npmrc — aube reads the same file when it PUTs the
        # tarball, so this step is still needed even though npm itself is not
        # the publish client.
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install mise
        run: |
          curl -fsSL https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Publish npm packages
        # `mise x aube@latest` resolves aube from the mise registry
        # (`registry/aube.toml` -> `github:endevco/aube`) and puts it on PATH
        # for the script. aube is intentionally *not* in this repo's
        # `mise.toml` because mise's npm backend auto-selects aube over npm
        # when it's installed in the toolset (see `package_manager_for_install`
        # in `src/backend/npm.rs`), which would change the install path for
        # every `npm:*` dev tool the repo uses.
        run: |
          if [[ ${DRY_RUN:-0} != 1 ]]; then
            if [[ -n "${{ inputs.version }}" ]]; then
              MISE_VERSION="${{ inputs.version }}"
            else
              MISE_VERSION="$(./scripts/get-version.sh)"
            fi
            export MISE_VERSION
            export RELEASE_DIR="releases"
            NPM_PREFIX=@jdxcode/mise mise x aube@latest -- ./scripts/release-npm.sh
          else
            echo "DRY RUN: Would publish npm packages"
          fi
