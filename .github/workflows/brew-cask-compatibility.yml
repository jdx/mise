name: brew-cask-compatibility

on:
  workflow_dispatch:
  push:
    branches:
      - fix/brew-cask-homebrew-metadata-receipt
    paths:
      - src/system/packages/brew/**
      - e2e/cli/test_system_install_brew_cask_compatibility_macos_slow
      - .github/workflows/brew-cask-compatibility.yml

permissions:
  contents: read

concurrency:
  group: brew-cask-compatibility-${{ github.ref }}
  cancel-in-progress: true

jobs:
  disposable-macos:
    runs-on: macos-15
    timeout-minutes: 60
    env:
      CI: "true"
      MISE_CASK_DIRECT_DISPOSABLE: "1"
      RUST_BACKTRACE: "1"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Assert disposable GitHub-hosted VM
        env:
          ASSERTED_RUNNER_ENVIRONMENT: ${{ runner.environment }}
        run: |
          test "$GITHUB_ACTIONS" = true
          test "$ASSERTED_RUNNER_ENVIRONMENT" = github-hosted
          test "$MISE_CASK_DIRECT_DISPOSABLE" = 1

      - name: Build mise
        run: cargo build --all-features

      - name: Exercise representative direct-pour matrix
        run: |
          export PATH="$PWD/target/debug:$PATH"
          export MISE_AUTO_INSTALL=0
          mise run test:e2e e2e/cli/test_system_install_brew_cask_compatibility_macos_slow
