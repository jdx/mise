name: pr-closer

on:
  schedule:
    - cron: "0 0 * * *" # daily at midnight
  workflow_dispatch:

jobs:
  close-stale-prs:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Warn and close stale PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          MARKER="<!-- mise-pr-closer-warning"

          gh pr list -R "$REPO" --state open --search "-author:jdx -label:keep-open sort:updated-asc" --json number,mergeStateStatus,statusCheckRollup,headRefOid --limit 500 | \
          jq -r '
            def failed_check:
              (.statusCheckRollup | length > 0) and
              ([.statusCheckRollup[].conclusion // "" | ascii_upcase] | any(. == "FAILURE" or . == "TIMED_OUT" or . == "ACTION_REQUIRED" or . == "STARTUP_FAILURE"));

            .[]
            | failed_check as $failed
            | (.mergeStateStatus == "DIRTY") as $conflicted
            | if $failed and $conflicted then [.number, .headRefOid, "failing checks and merge conflicts"]
              elif $failed then [.number, .headRefOid, "failing checks"]
              elif $conflicted then [.number, .headRefOid, "merge conflicts"]
              else empty
              end
            | @tsv
          ' | \
          while IFS=$'\t' read -r pr head_sha reason; do
            comments=$(gh api "repos/$REPO/issues/$pr/comments" --paginate)
            warning_dates=$(jq -r --arg marker "$MARKER" --arg head_sha "$head_sha" '
              .[]
              | select(.body | contains($marker))
              | select(.body | contains("head_sha: " + $head_sha))
              | .body
              | capture("date: (?<date>[0-9]{4}-[0-9]{2}-[0-9]{2})")
              | .date
            ' <<< "$comments" | sort -u)

            warning_days=0
            if [[ -n "$warning_dates" ]]; then
              yesterday=$(date -u -d "$TODAY - 1 day" +%Y-%m-%d)
              latest_warning=$(tail -n 1 <<< "$warning_dates")
              if [[ "$latest_warning" == "$TODAY" || "$latest_warning" == "$yesterday" ]]; then
                oldest_consecutive="$latest_warning"
                cursor="$latest_warning"
                while previous_day=$(date -u -d "$cursor - 1 day" +%Y-%m-%d); grep -qx "$previous_day" <<< "$warning_dates"; do
                  oldest_consecutive="$previous_day"
                  cursor="$previous_day"
                done
                warning_days=$(( ($(date -u -d "$latest_warning" +%s) - $(date -u -d "$oldest_consecutive" +%s)) / 86400 + 1 ))
              fi
            fi

            if (( warning_days >= 7 )); then
              echo "Closing PR #$pr ($reason for $warning_days consecutive warning days)"
              gh pr close "$pr" -R "$REPO" -c "$(cat <<EOF
          This PR has had $reason for $warning_days consecutive warning days, so it is being closed automatically.

          Feel free to reopen or create a new PR if you'd like to continue working on this.

          *This comment was generated by an automated workflow.*
          EOF
          )"
              continue
            fi

            if grep -qx "$TODAY" <<< "$warning_dates"; then
              echo "Already warned PR #$pr today ($reason)"
            else
              echo "Warning PR #$pr ($reason)"
              gh pr comment "$pr" -R "$REPO" --body "$(cat <<EOF
          This PR currently has $reason. If this continues for 7 days, it will be closed automatically.

          This is warning day $((warning_days + 1)) of 7.

          Please update the PR when you have a chance. Feel free to reopen or create a new PR if it is closed and you'd like to continue working on it.

          *This comment was generated by an automated workflow.*

          $MARKER
          date: $TODAY
          head_sha: $head_sha
          -->
          EOF
          )"
              warning_dates=$(printf '%s\n%s\n' "$warning_dates" "$TODAY" | sort -u)
            fi
          done
