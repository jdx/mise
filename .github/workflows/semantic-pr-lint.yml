name: semantic-pr-lint

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.MISE_PR_COMMENT_TOKEN }}
        with:
          types: |
            fix
            feat
            refactor
            chore
            docs
            style
            test
            perf
            build
            registry
            revert
            security
