name: hyperfine
on:
  pull_request:
    branches: ["main"]
    # paths:
    #   - ".github/workflows/hyperfine.yml"
    #   - "Cargo.toml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  GITHUB_TOKEN: ${{ secrets.MISE_GH_TOKEN || secrets.GITHUB_TOKEN }}
  MISE_EXPERIMENTAL: 1

permissions:
  pull-requests: write

jobs:
  benchmark:
    runs-on: namespace-profile-endev-linux-amd64-large;overrides.cache-tag=mise-pr-rust-linux
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/.global-cache
            ~/.cache/sccache
      - uses: taiki-e/install-action@51cd0b8c0499559d9a4d75c0f5c67bec3a894ec8 # v2
        with: { tool: sccache }
      - name: Configure sccache
        run: |
          export RUSTC_WRAPPER=sccache
          export SCCACHE_DIR="$HOME/.cache/sccache"
          export SCCACHE_CACHE_SIZE=20G
          {
            echo "RUSTC_WRAPPER=$RUSTC_WRAPPER"
            echo "SCCACHE_DIR=$SCCACHE_DIR"
            echo "SCCACHE_CACHE_SIZE=$SCCACHE_CACHE_SIZE"
          } >> "$GITHUB_ENV"
          sccache --zero-stats
      - run: curl https://mise.run | MISE_INSTALL_PATH="$HOME/bin/mise-release" sh
      - run: echo "$HOME/bin" >> "$GITHUB_PATH"
      - id: versions
        run: |
          #echo "main=$(git rev-parse --short origin/main)" >> "$GITHUB_OUTPUT"
          echo "release=$(mise-release v | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      #- uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
      #  with:
      #    path: ~/bin/mise-${{ steps.versions.outputs.main }}
      #    key: mise-hyperfine-main-${{ steps.versions.outputs.main }}-${{ runner.os }}-${{ runner.arch }}
      #- name: build main
      #  run: |
      #    if [ ! -f "$HOME/bin/mise-${{ steps.versions.outputs.main }}" ]; then
      #      git checkout main
      #      cargo build --profile serious && mv target/serious/mise "$HOME/bin/mise-${{ steps.versions.outputs.main }}"
      #      git checkout -
      #    fi
      - run: mv "$HOME/bin/mise-release" "$HOME/bin/mise-${{ steps.versions.outputs.release }}"
      #- run: cp "$HOME/bin/mise-${{ steps.versions.outputs.main }}" "$HOME/bin/mise-main"
      - run: cargo build --profile serious && mv target/serious/mise "$HOME/bin"
      - uses: ./.github/actions/mise-tools
      - run: |
          set -x
          failed=false
          CMDS=(
            "x -- echo"
            "env"
            "hook-env"
            "ls"
          )
          echo "## Hyperfine Performance" >> comment.md
          for cmd in "${CMDS[@]}"; do
            if [ -n "${MISE_ALT:-}" ]; then
              reference="$MISE_ALT $cmd"
            else
              reference="mise-${{ steps.versions.outputs.release }} $cmd"
            fi
            mise x hyperfine -- hyperfine -N -w 10 -r 500 --export-markdown out.md --export-json out.json --reference "$reference" "$reference" "mise $cmd"
            echo "### \`mise $cmd\`" >> comment.md
            cat out.md >> comment.md
            cat out.md

            analysis=$(CMD="$cmd" python3 <<'PY'
          import json
          import math
          import os

          REGRESSION_THRESHOLD = 1.10
          # Only fail when the slowdown is beyond the threshold even after
          # accounting for measurement error, and the error is not itself large.
          MAX_CLEAR_ERROR = 0.10

          cmd = os.environ["CMD"]
          with open("out.json", encoding="utf-8") as f:
              results = json.load(f)["results"]

          reference, current = results[0], results[1]
          reference_mean = float(reference["mean"])
          current_mean = float(current["mean"])
          reference_stddev = float(reference.get("stddev") or 0)
          current_stddev = float(current.get("stddev") or 0)

          def ratio_error(ratio: float) -> float:
              return ratio * math.sqrt(
                  (reference_stddev / reference_mean) ** 2
                  + (current_stddev / current_mean) ** 2
              )

          if current_mean > reference_mean:
              ratio = current_mean / reference_mean
              error = ratio_error(ratio)
              variance = round((ratio - 1) * 100)
              error_percent = round(error * 100)
              if ratio <= REGRESSION_THRESHOLD:
                  print("ok\t")
              elif ratio - error > REGRESSION_THRESHOLD and error <= MAX_CLEAR_ERROR:
                  print(
                      f"fail\t⚠️  Warning: Performance variance for `{cmd}` is "
                      f"{variance}% (±{error_percent}%)"
                  )
              else:
                  print(
                      f"ok\t⚠️  Inconclusive performance variance for `{cmd}` is "
                      f"{variance}% (±{error_percent}%); not failing because the "
                      "measurement is noisy"
                  )
          else:
              ratio = reference_mean / current_mean
              error = ratio_error(ratio)
              variance = round((ratio - 1) * 100)
              error_percent = round(error * 100)
              if ratio > REGRESSION_THRESHOLD:
                  print(f"ok\t✅  Performance improvement for `{cmd}` is {variance}% (±{error_percent}%)")
              else:
                  print("ok\t")
          PY
          )
            status=${analysis%%$'\t'*}
            message=${analysis#*$'\t'}
            if [ -n "$message" ]; then
              echo "$message" >> comment.md
            fi
            if [ "$status" = fail ]; then
              failed=true
            fi
          done
          if [ "$failed" = true ]; then
            exit 1
          fi
        env:
          SHELL: zsh
      - run: mise run test:perf
        if: always()
        env:
          NUM_TOOLS: 200
          NUM_TASKS: 2000
          RUNS: 10
          MISE_ALT: mise-${{ steps.versions.outputs.release }}
      - if: always()
        run: sccache --show-stats
      - run: cat comment.md >> "$GITHUB_STEP_SUMMARY"
        if: always() && github.event_name == 'pull_request'
      - name: Comment on PR
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b # v3
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        with:
          file-path: comment.md
          comment-tag: hyperfine
