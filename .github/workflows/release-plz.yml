name: release-plz

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: release-plz

env:
  MISE_EXPERIMENTAL: 1
  NPM_CONFIG_FUND: false
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  GITHUB_TOKEN: ${{ secrets.MISE_GH_TOKEN || secrets.GITHUB_TOKEN }}

jobs:
  pending-release:
    if: github.repository == 'jdx/mise'
    runs-on: ubuntu-latest
    outputs:
      has_release_commits: ${{ steps.commits.outputs.has_release_commits }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Check for fix/feat commits since the latest release
        id: commits
        run: |
          set -euo pipefail

          latest_tag=$(git tag --list 'v[0-9]*' --sort=-v:refname | head -1 || true)
          if [ -n "$latest_tag" ]; then
            range="${latest_tag}..HEAD"
            echo "Checking pending commits since ${latest_tag}"
          else
            range="HEAD"
            echo "No v* release tag found; checking all commits"
          fi

          if git log --format=%s "$range" | grep -Eq '^(fix|feat)(\([^)]+\))?!?: '; then
            echo "has_release_commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "No pending fix/feat commits; skipping autorelease."
            echo "has_release_commits=false" >> "$GITHUB_OUTPUT"
          fi

  release-plz:
    needs: pending-release
    if: github.repository == 'jdx/mise' && needs.pending-release.outputs.has_release_commits == 'true'
    timeout-minutes: 20
    runs-on: namespace-profile-endev-linux-amd64;overrides.cache-tag=mise-release-plz-rust-linux
    permissions:
      pull-requests: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          token: ${{ secrets.MISE_GH_TOKEN }}
      - uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.MISE_GPG_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true
      - run: mkdir -p "$HOME/bin" && echo "$HOME/bin" >> "$GITHUB_PATH"
      - run: cargo build --all-features && cp target/debug/mise "$HOME"/bin
      - uses: ./.github/actions/mise-tools
      - run: mise x -- bun i
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: crates-io-auth
      - run: mise run release-plz
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
