name: docs

on:
  push:
    paths:
      - ".github/actions/**"
      - ".github/workflows/docs.yml"
      - "bun.lock"
      - "docs/**"
      - "mise.toml"
      - "package.json"
      - "registry/**"
      - "settings.toml"
      - "tasks.toml"
      - "tasks/docs/**"
      - "xtasks/docs/**"
    branches:
      - main
  pull_request:
    paths:
      - ".github/actions/**"
      - ".github/workflows/docs.yml"
      - "bun.lock"
      - "docs/**"
      - "mise.toml"
      - "package.json"
      - "registry/**"
      - "settings.toml"
      - "tasks.toml"
      - "tasks/docs/**"
      - "xtasks/docs/**"
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docs-${{ github.head_ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.MISE_GH_TOKEN || secrets.GITHUB_TOKEN }}

jobs:
  docs:
    if: github.repository == 'jdx/mise'
    runs-on: namespace-profile-endev-linux-amd64;overrides.cache-tag=mise-pr-rust-linux
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # for lastUpdated
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install_args: bun
      - run: mise x wait-for-gh-rate-limit -- wait-for-gh-rate-limit
      - run: bun i
      - run: mise run docs:release
        env:
          CLOUDFLARE_ACCOUNT_ID: 6e243906ff257b965bcae8025c2fc344
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_DEPLOY_TOKEN }}
          DRY_RUN: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
