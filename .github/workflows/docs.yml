name: docs

on:
  push:
    paths:
      - ".github/actions/**"
      - ".github/workflows/docs.yml"
      - "bun.lock"
      - "docs/**"
      - "mise.toml"
      - "package.json"
      - "registry/**"
      - "settings.toml"
      - "tasks.toml"
      - "tasks/docs/**"
      - "xtasks/docs/**"
    branches:
      - main
  pull_request:
    paths:
      - ".github/actions/**"
      - ".github/workflows/docs.yml"
      - "bun.lock"
      - "docs/**"
      - "mise.toml"
      - "package.json"
      - "registry/**"
      - "settings.toml"
      - "tasks.toml"
      - "tasks/docs/**"
      - "xtasks/docs/**"
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docs-${{ github.head_ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.MISE_GH_TOKEN || secrets.GITHUB_TOKEN }}

jobs:
  docs:
    if: github.repository == 'jdx/mise'
    runs-on: ubuntu-latest
    # `id-token: write` is required so mise-action can mint the GHA
    # OIDC token mise exchanges for a wings session. Without this
    # permission the wings activation falls through to direct-origin
    # fetches (the action emits a warning) — opt-in dogfood, not a
    # build break.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # for lastUpdated
      # Pinned to the wings-cli SHA on jdx/mise-action's `feat/wings`
      # branch (PR #454) which adds `wings_enabled` / `wings_host`
      # inputs. Once that PR merges, bump to the next official tag.
      - uses: jdx/mise-action@6c0eaa61572c1c14f118042f6edd3d707d69aaf1 # feat/wings
        with:
          install_args: bun
          # Dogfood mise-wings caching for tool installs in this
          # workflow — npm tarballs (bun) and any GitHub release
          # downloads route through the wings cache. Authentication
          # uses the runner's OIDC identity automatically (no secret
          # to rotate). Default-off elsewhere; this workflow is the
          # canary.
          wings_enabled: true
      - run: mise x wait-for-gh-rate-limit -- wait-for-gh-rate-limit
      - run: bun i
      - run: mise run docs:release
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_SECRET_ACCESS_KEY }}
          DRY_RUN: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
