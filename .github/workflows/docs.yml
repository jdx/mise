name: docs

on:
  push:
    paths:
      - ".github/actions/**"
      - ".github/workflows/docs.yml"
      - "bun.lock"
      - "docs/**"
      - "mise.toml"
      - "package.json"
      - "registry/**"
      - "settings.toml"
      - "tasks.toml"
      - "tasks/docs/**"
      - "xtasks/docs/**"
    branches:
      - main
  pull_request:
    paths:
      - ".github/actions/**"
      - ".github/workflows/docs.yml"
      - "bun.lock"
      - "docs/**"
      - "mise.toml"
      - "package.json"
      - "registry/**"
      - "settings.toml"
      - "tasks.toml"
      - "tasks/docs/**"
      - "xtasks/docs/**"
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docs-${{ github.head_ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.MISE_GH_TOKEN || secrets.GITHUB_TOKEN }}

jobs:
  docs:
    if: github.repository == 'jdx/mise'
    runs-on: namespace-profile-endev-linux-amd64;overrides.cache-tag=mise-pr-rust-linux
    # `id-token: write` lets the runner mint the OIDC token mise
    # exchanges for a wings session at `POST /auth`. Combined
    # with the explicit `MISE_WINGS_ENABLED=1` opt-in below,
    # normal tool installs can resolve through the mise-wings
    # catalog and OCI registry.
    permissions:
      contents: read
      id-token: write
    env:
      # Opt in to wings for this workflow. Required for the
      # auto-OIDC exchange to fire; without it mise leaves wings
      # inactive (no identity data sent to wings).
      MISE_WINGS_ENABLED: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # for lastUpdated
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          install_args: bun
      - run: mise x wait-for-gh-rate-limit -- wait-for-gh-rate-limit
      - run: bun i
      - run: mise run docs:release
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_SECRET_ACCESS_KEY }}
          DRY_RUN: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
