# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: aquaproj
    repo_name: registry-tool
    description: CLI to develop aqua Registry
    files:
      - name: argd
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.3.7-0"
        asset: registry-tool_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: aqua-registry
        checksum:
          type: github_release
          asset: registry-tool_{{trimV .Version}}_checksums.txt
          algorithm: sha256
          cosign:
            opts:
              - --certificate-identity-regexp
              - "https://github\\.com/suzuki-shunsuke/go-release-workflow/\\.github/workflows/release\\.yaml@.*"
              - --certificate-oidc-issuer
              - https://token.actions.githubusercontent.com
            bundle:
              type: github_release
              asset: registry-tool_{{trimV .Version}}_checksums.txt.bundle
        slsa_provenance:
          type: github_release
          asset: multiple.intoto.jsonl
      - version_constraint: semver("<= 0.1.5")
        asset: registry-tool_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: aqua-registry
        checksum:
          type: github_release
          asset: registry-tool_{{trimV .Version}}_checksums.txt
          algorithm: sha256
      - version_constraint: semver("<= 0.3.6")
        asset: registry-tool_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        files:
          - name: aqua-registry
        checksum:
          type: github_release
          asset: registry-tool_{{trimV .Version}}_checksums.txt
          algorithm: sha256
          cosign:
            opts:
              - --certificate-oidc-issuer
              - "https://token.actions.githubusercontent.com"
              - --certificate-identity-regexp
              - "https://github\\.com/suzuki-shunsuke/go-release-workflow/\\.github/workflows/release\\.yaml@.*"
              - --certificate
              - https://github.com/aquaproj/registry-tool/releases/download/{{.Version}}/registry-tool_{{trimV .Version}}_checksums.txt.pem
              - --signature
              - https://github.com/aquaproj/registry-tool/releases/download/{{.Version}}/registry-tool_{{trimV .Version}}_checksums.txt.sig
        slsa_provenance:
          type: github_release
          asset: multiple.intoto.jsonl
      - version_constraint: "true"
        asset: argd_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: argd_checksums.txt
          algorithm: sha256
          cosign:
            opts:
              - --certificate-identity-regexp
              - "https://github\\.com/suzuki-shunsuke/go-release-workflow/\\.github/workflows/release\\.yaml@.*"
              - --certificate-oidc-issuer
              - "https://token.actions.githubusercontent.com"
            bundle:
              type: github_release
              asset: argd_checksums.txt.bundle
        slsa_provenance:
          type: github_release
          asset: multiple.intoto.jsonl
