# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: temporalio
    repo_name: temporal
    description: Temporal Server bundle (temporal-server + database tools)
    files:
      - name: temporal-server
      - name: temporal-cassandra-tool
      - name: temporal-sql-tool
      - name: temporal-elasticsearch-tool
      - name: tdbg
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 1.30.1")
        asset: temporal_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        overrides:
          - goos: windows
            format: zip
        files:
          - name: temporal-server
          - name: temporal-cassandra-tool
          - name: temporal-sql-tool
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
      - version_constraint: "true"
        asset: temporal_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        overrides:
          - goos: windows
            format: zip
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
