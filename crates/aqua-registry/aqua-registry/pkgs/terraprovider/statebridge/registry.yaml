# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: terraprovider
    repo_name: statebridge
    description: CLI tool for declarative opentofu state migrations
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("< 0.15.0")
        error_message: Please use v0.15.0 or later
      - version_constraint: "true"
        asset: statebridge_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
          cosign:
            opts:
              - --certificate-identity-regexp
              - "^https://github\\.com/terraprovider/statebridge/\\.github/workflows/.+\\.ya?ml@refs/tags/\\Q{{.Version}}\\E$"
              - --certificate-oidc-issuer
              - https://token.actions.githubusercontent.com
            bundle:
              type: github_release
              asset: checksums.txt.sigstore.json
        slsa_provenance:
          type: github_release
          asset: multiple.intoto.jsonl
        github_artifact_attestations:
          signer_workflow: terraprovider/statebridge/\.github/workflows/release\.yml
        overrides:
          - goos: windows
            format: zip
