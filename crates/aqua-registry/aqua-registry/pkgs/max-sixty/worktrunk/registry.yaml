# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: max-sixty
    repo_name: worktrunk
    description: Worktrunk is a CLI for Git worktree management, designed for parallel AI agent workflows
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.1.12")
        asset: worktrunk-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.xz
        windows_arm_emulation: true
        files:
          - name: wt
            src: "{{.AssetWithoutExt}}/wt"
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        overrides:
          - goos: darwin
            replacements:
              arm64: aarch64
          - goos: windows
            format: zip
            files:
              - name: wt
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        asset: worktrunk-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.xz
        windows_arm_emulation: true
        files:
          - name: wt
            src: "{{.AssetWithoutExt}}/wt"
          - name: git-wt
            src: "{{.AssetWithoutExt}}/git-wt"
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
            files:
              - name: wt
              - name: git-wt
