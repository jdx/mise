# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: fwdcloudsec
    repo_name: granted
    aliases:
      - name: common-fate/granted
    description: The easiest way to access your cloud
    files:
      - name: granted
      - name: assume
      - name: assumego
    version_constraint: "false"
    version_overrides:
      # From version 0.35.0 forward, GitHub Release artifacts are also published.
      - version_constraint: semver("< 0.35.0")
        type: http
        url: https://releases.commonfate.io/granted/{{.Version}}/granted_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        asset: granted_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
        overrides:
          - goos: windows
            format: zip
          - goos: darwin
            files:
              - name: granted
              - name: assume
              - name: assumego
                src: granted
                link: assumego
      # Version 0.39.0 did not publish prebuilt Darwin artifacts.
      - version_constraint: Version == "v0.39.0"
        asset: granted_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        overrides:
          - goos: windows
            format: zip
        replacements:
          amd64: x86_64
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - linux
          - windows
      - version_constraint: "true"
        asset: granted_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
          - goos: darwin
            files:
              - name: granted
              - name: assume
              - name: assumego
                src: granted
                link: assumego
