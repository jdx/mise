# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: textfuel
    repo_name: lazyjira
    description: Lazygit but for Jira
    version_constraint: "false"
    version_overrides:
      - version_constraint: "true"
        asset: lazyjira_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        checksum:
          type: github_release
          asset: lazyjira_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
