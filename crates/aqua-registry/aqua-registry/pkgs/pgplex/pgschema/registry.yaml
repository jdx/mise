# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: pgplex
    repo_name: pgschema
    description: Terraform-style, declarative schema migration CLI for Postgres. Agent friendly
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 1.2.1")
        asset: pgschema-{{.OS}}-{{.Arch}}
        format: raw
        supported_envs:
          - linux/amd64
          - darwin/arm64
      - version_constraint: semver("<= 1.4.1")
        asset: pgschema-{{.OS}}-{{.Arch}}
        format: raw
        supported_envs:
          - linux
          - darwin/arm64
      - version_constraint: semver("<= 1.5.0")
        asset: pgschema-{{trimV .Version}}-{{.OS}}-{{.Arch}}
        format: raw
        supported_envs:
          - linux
          - darwin/arm64
      - version_constraint: "true"
        asset: pgschema-{{trimV .Version}}-{{.OS}}-{{.Arch}}
        format: raw
        supported_envs:
          - linux
          - darwin
