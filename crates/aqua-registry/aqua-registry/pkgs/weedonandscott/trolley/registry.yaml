# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: weedonandscott
    repo_name: trolley
    description: Run terminal apps anywhere
    version_constraint: "false"
    version_overrides:
      - version_constraint: "true"
        asset: trolley-cli-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.xz
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: macos
