# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: android-sms-gateway
    repo_name: cli
    description: A command-line interface for working with SMS Gateway for Android
    files:
      - name: smsgate
      - name: smsgate-ca
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.0.3"
        no_asset: true
      - version_constraint: Version == "v0.0.1"
        asset: cli_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: cli_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
            files:
              - name: smsgate
                src: cli
          - files:
              - name: smsgate
                src: cli
      - version_constraint: Version == "v0.0.2"
        asset: smsgate_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: smsgate_{{trimV .Version}}_checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
            files:
              - name: smsgate
          - files:
              - name: smsgate
      - version_constraint: "true"
        asset: smsgate_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        overrides:
          - goos: windows
            format: zip
        replacements:
          amd64: x86_64
          darwin: Darwin
          linux: Linux
          windows: Windows
        checksum:
          type: github_release
          asset: smsgate_{{trimV .Version}}_checksums.txt
          algorithm: sha256
