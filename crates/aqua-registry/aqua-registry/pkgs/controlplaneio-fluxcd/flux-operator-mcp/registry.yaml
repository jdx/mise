# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - name: controlplaneio-fluxcd/flux-operator/flux-operator-mcp
    type: github_release
    repo_owner: controlplaneio-fluxcd
    repo_name: flux-operator
    description: GitOps on Autopilot Mode
    version_constraint: semver(">= 0.20.0")
    asset: flux-operator-mcp_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
    format: tar.gz
    overrides:
      - goos: windows
        format: zip
    checksum:
      type: github_release
      asset: flux-operator_{{.Version}}_checksums.txt
      algorithm: sha256
    supported_envs:
      - darwin
      - linux
      - windows
