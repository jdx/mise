# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: betterleaks
    repo_name: betterleaks
    description: A Better Secrets Scanner built for configurability and speed
    search_words:
      - gitleaks
      - secrets
    version_constraint: "false"
    version_overrides:
      - version_constraint: "true"
        asset: betterleaks_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x64
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
