# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: jorgelbg
    repo_name: pinentry-touchid
    description: Custom GPG pinentry program for macOS that allows using Touch ID for fetching the password from the macOS keychain
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.0.1"
        asset: pinentry-touchid_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        rosetta2: true
        replacements:
          darwin: macos
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - darwin
      - version_constraint: "true"
        asset: pinentry-touchid_{{trimV .Version}}_{{.OS}}_{{.Arch}}.{{.Format}}
        format: tar.gz
        replacements:
          darwin: macos
        checksum:
          type: github_release
          asset: checksums.txt
          algorithm: sha256
        supported_envs:
          - darwin
