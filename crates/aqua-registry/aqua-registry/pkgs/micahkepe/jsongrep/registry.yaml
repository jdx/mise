# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: micahkepe
    repo_name: jsongrep
    description: A path query language for JSON, YAML, TOML, and other serialization formats
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.1.1"
        asset: jsongrep-{{trimV .Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        files:
          - name: jg
            src: "{{.AssetWithoutExt}}/jg"
        format: tar.gz
        rosetta2: true
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-musl
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        supported_envs:
          - linux/amd64
          - darwin
      - version_constraint: semver("<= 0.6.0")
        asset: jsongrep-{{trimV .Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        files:
          - name: jg
            src: "{{.AssetWithoutExt}}/jg"
        format: tar.gz
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
            checksum:
              type: github_release
              asset: "{{.Asset}}.sha256"
              algorithm: sha256
              file_format: regexp
              pattern:
                checksum: (\b[A-Fa-f0-9]{64}\b)
        supported_envs:
          - darwin
          - windows
          - amd64
      - version_constraint: "true"
        asset: jsongrep-{{trimV .Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        files:
          - name: jg
            src: "{{.AssetWithoutExt}}/jg"
        format: tar.gz
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        checksum:
          type: github_release
          asset: "{{.Asset}}.sha256"
          algorithm: sha256
        overrides:
          - goos: windows
            format: zip
            checksum:
              type: github_release
              asset: "{{.Asset}}.sha256"
              algorithm: sha256
              file_format: regexp
              pattern:
                checksum: (\b[A-Fa-f0-9]{64}\b)
