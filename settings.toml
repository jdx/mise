env = "MISE_JAVA_SHORTHAND_VENDOR"
type = "String"

[jobs]
default = 8
description = "How many jobs to run concurrently such as tool installs."
env = "MISE_JOBS"
rust_type = "usize"
type = "Integer"

[legacy_version_file]
default = true
deprecated = "Use idiomatic_version_file instead."
description = "Set to false to disable the idiomatic version files such as .node-version, .ruby-version, etc."
env = "MISE_LEGACY_VERSION_FILE"
hide = true
type = "Bool"

[legacy_version_file_disable_tools]
default = []
deprecated = "Use idiomatic_version_file_disable_tools instead."
description = "Specific tools to disable idiomatic version files for."
env = "MISE_LEGACY_VERSION_FILE_DISABLE_TOOLS"
hide = true
parse_env = "set_by_comma"
rust_type = "BTreeSet<String>"
type = "SetString"

[libc]
default_docs = '"glibc" | "musl"'
description = "Libc implementation to use for precompiled Linux binaries."
docs = """
Libc implementation to use for precompiled Linux binaries. This is used by backends that publish
separate glibc and musl builds. If unset, mise will detect the current system's libc.

`gnu` is accepted as an alias for `glibc`.
"""
enum = ["glibc", "gnu", "musl"]
env = "MISE_LIBC"
optional = true
type = "String"

[libgit2]
default = true
description = "Use libgit2 for git operations, set to false to shell out to git."
docs = """
Use libgit2 for git operations. This is generally faster but may not be as compatible if the
system's libgit2 is not the same version as the one used by mise.
"""
env = "MISE_LIBGIT2"
hide = true
type = "Bool"

[locked]
default = false
description = "Require lockfile URLs to be present during installation."
docs = """

> [!NOTE]
> This setting requires [lockfile](#lockfile) to be enabled.

When enabled, `mise install` will fail if tools don't have pre-resolved URLs in the lockfile
for the current platform. This prevents API calls to GitHub, aqua registry, etc. and ensures
reproducible installations.

This is useful in CI/CD environments where you want to:
- Avoid GitHub API rate limits
- Ensure deterministic builds using pre-resolved URLs
- Fail fast if the lockfile is incomplete

To generate lockfile URLs, run:

```sh
mise lock
```

Equivalent to passing `--locked` to `mise install`.
"""
env = "MISE_LOCKED"
type = "Bool"

[locked_verify_provenance]
default = false
description = "Re-verify provenance at install time even when the lockfile already has provenance."
docs = """
When enabled, `mise install` will re-verify provenance (SLSA, cosign, minisign,
GitHub artifact attestations) at install time even when the lockfile already
contains both a checksum and a provenance entry.

By default, when a lockfile has a checksum and provenance type recorded,
`mise install` trusts the lockfile and skips re-verification to avoid redundant
API calls (e.g., to GitHub). Enabling this setting forces re-verification every
time, which provides stronger security guarantees at the cost of additional
network requests.

This is automatically enabled when `paranoid` is set to `true`.
"""
env = "MISE_LOCKED_VERIFY_PROVENANCE"
type = "Bool"

[lockfile]
description = "Create and read lockfiles for tool versions."
docs = """
Read/update lockfiles for tool versions. This is useful when you'd like to have loose versions in mise.toml like this:

```toml
[tools]
node = "22"
gh = "latest"
```

But you'd like the versions installed to be consistent within a project. When this is enabled, mise will update mise.lock
files next to mise.toml files containing pinned versions. When installing tools, mise will reference this lockfile if it exists and this setting is enabled to resolve versions.

The lockfiles are not created automatically. To generate them, run the following (assuming the config file is `mise.toml`):

```sh
touch mise.lock && mise install
```

The lockfile is named the same as the config file but with `.lock` instead of `.toml` as the extension, e.g.:

- `mise.toml` -> `mise.lock`
- `mise.local.toml` -> `mise.local.lock`
- `.config/mise.toml` -> `.config/mise.lock`

When set to `true`, lockfiles are read and written. When set to `false`, lockfiles are explicitly disabled—this
will cause an error if `locked = true` is also set, since locked mode requires reading lockfiles.
When unset (the default), lockfiles are enabled (same as `true`) but there is no conflict with `locked` mode.
"""
env = "MISE_LOCKFILE"
optional = true
type = "Bool"

[lockfile_platforms]
description = "Platforms to target in lockfile operations."
docs = """
Restricts which platforms are included when auto-locking (triggered by `mise install`/`mise use`)
or when running `mise lock` without `--platform`. By default (unset), mise targets all common
platforms (linux-x64, linux-x64-musl, linux-arm64, linux-arm64-musl, macos-x64, macos-arm64,
windows-x64) plus the current platform.

Setting this avoids resolving checksums/URLs for platforms you don't need, keeping lockfiles
smaller and `mise install`/`mise use` faster.

Does NOT override explicit `mise lock --platform` flags.

```toml
[settings]
lockfile_platforms = ["macos-arm64", "linux-x64"]
```

The current platform is always included in addition to any configured platforms.

Platform format: `os-arch` or `os-arch-qualifier` (e.g., `linux-x64`, `linux-x64-musl`, `macos-arm64`).
"""
env = "MISE_LOCKFILE_PLATFORMS"
optional = true
parse_env = "list_by_comma"
rust_type = "Vec<String>"
type = "ListString"

[log_level]
default = "info"
description = "Show more/less output."
enum = ["trace", "debug", "info", "warn", "error"]
env = "MISE_LOG_LEVEL"
hide = true
type = "String"

[minimum_release_age]
description = "Minimum release age / supply chain protection — only install versions older than this threshold"
docs = """
Filter tool versions by release date to limit supply chain risk. Similar to Renovate's
[minimum release age](https://docs.renovatebot.com/key-concepts/minimum-release-age/),
this ensures newly published versions are ignored until they've been available for a
configurable amount of time — giving the community time to discover compromised releases.
This name matches pnpm's `minimumReleaseAge` setting, though mise accepts both relative
durations and absolute cutoff dates.

Supports:

- Relative durations: `7d` (7 days ago), `90d` (90 days ago), `6m` (6 months ago), `1y` (1 year ago)
- Absolute dates: `2024-06-01`, `2024-06-01T12:00:00Z`

Example:

```toml
[settings]
minimum_release_age = "7d"  # only install versions released more than 7 days ago
```

Only affects backends that provide release timestamps (aqua, cargo, npm, pipx, and some core plugins).
Versions without timestamps are included by default.

**Behavior**: For most backends, this filter only applies when resolving fuzzy version requests
like `node@20` or `latest`. Explicitly pinned versions like `node@22.5.0` are not filtered,
allowing you to selectively use newer versions for specific tools while keeping others behind the
cutoff date.

Some package-manager backends also forward the cutoff to transitive dependency resolution during
install. This includes `npm:` and `pipx:` tools.

Can be overridden with the `--before` CLI flag or per-tool with the `minimum_release_age` tool option.

```toml
[tools.trivy]
version = "latest"
minimum_release_age = "7d"  # override for this tool only
```
"""
env = "MISE_MINIMUM_RELEASE_AGE"
optional = true
type = "String"

[netrc]
default = true
description = "Use a netrc file for HTTP Basic authentication."
docs = """
When enabled, mise will read credentials from the netrc file and apply
HTTP Basic authentication for matching hosts. This is useful for accessing
private artifact repositories like Artifactory or Nexus.

On Unix/macOS, the default path is `~/.netrc`.
On Windows, mise looks for `%USERPROFILE%\\_netrc` first, then falls back to `%USERPROFILE%\\.netrc`.

The netrc file format is:

```
machine artifactory.example.com
  login myuser
  password mytoken
```

You can also specify a custom netrc file path using the `netrc_file` setting.
"""
env = "MISE_NETRC"
type = "Bool"

[netrc_file]
description = "Path to the netrc file to use for HTTP Basic authentication."
docs = """
Override the default netrc file path. This is useful if you want to use a
different netrc file for mise or if your netrc file is in a non-standard location.
"""
env = "MISE_NETRC_FILE"
optional = true
type = "Path"

[no_env]
description = "Do not load environment variables from config files."
env = "MISE_NO_ENV"
optional = true
type = "Bool"

[no_hooks]
description = "Do not execute hooks from config files."
env = "MISE_NO_HOOKS"
optional = true
type = "Bool"

[node.cflags]
description = "Additional CFLAGS options (e.g., to override -O3)."
env = "MISE_NODE_CFLAGS"
optional = true
type = "String"

[node.compile]
