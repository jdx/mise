hide = true
type = "Bool"

[npm.package_manager]
default = "auto"
description = "Package manager to use for installing npm packages."
docs = """
Package manager to use for installing npm packages. The default, `auto`, uses
`aube` when it is installed and falls back to `npm`, similar to how the pipx
backend uses `uv` when available. Set this to `npm`, `aube`, `bun`, or `pnpm`
to force a specific package manager.
"""
enum = ["auto", "npm", "aube", "bun", "pnpm"]
env = "MISE_NPM_PACKAGE_MANAGER"
rust_type = "NpmPackageManager"
type = "String"

[oci.default_from]
default = "debian:bookworm-slim"
description = "Default base image for `mise oci build` when [oci].from is not set."
docs = """
Default base image reference used by `mise oci build` when the `mise.toml` does
not set `[oci].from` and `--from` is not passed on the CLI. Must be a glibc-based
image for most mise tool installs (Node, Python, Ruby prebuilt binaries) to work.

Common overrides:
- `debian:bookworm-slim` (default) — glibc, ~30MB compressed
- `ubuntu:24.04` — glibc, slightly larger, familiar
- `gcr.io/distroless/cc-debian12` — glibc, no shell (not recommended for dev)

Alpine-based images are **not** recommended because their musl libc breaks
glibc-linked prebuilt binaries that most tools ship.
"""
env = "MISE_OCI_DEFAULT_FROM"
type = "String"

[oci.default_mount_point]
default = "/mise"
description = "Path inside OCI images where mise tools are installed."
docs = """
Path inside the built image where mise tool installs and shims are placed.
Defaults to `/mise`. The resulting image sets `MISE_DATA_DIR` to this path.
"""
env = "MISE_OCI_DEFAULT_MOUNT_POINT"
type = "String"

[offline]
description = "Disable all HTTP requests. Tools will only use locally cached data."
docs = """
When enabled, mise will never make HTTP requests. This is useful for air-gapped environments,
VPN issues, or when you want to ensure mise only uses locally cached data.

Note: Commands like `hook-env`, `activate`, `exec`, `env`, and shims already avoid most network
requests via the `prefer_offline` behavior. Set `offline = true` to completely block all
HTTP requests for commands like `mise install` or `mise ls-remote` as well.

Can also be set with the `--offline` CLI flag.
"""
env = "MISE_OFFLINE"
type = "Bool"

