When enabled, mise will never make HTTP requests. This is useful for air-gapped environments,
VPN issues, or when you want to ensure mise only uses locally cached data.

Note: Commands like `hook-env`, `activate`, `exec`, `env`, and shims already avoid most network
requests via the `prefer_offline` behavior. Set `offline = true` to completely block all
HTTP requests for commands like `mise install` or `mise ls-remote` as well.

Can also be set with the `--offline` CLI flag.
"""
env = "MISE_OFFLINE"
type = "Bool"

