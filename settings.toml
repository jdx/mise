[task.disable_spec_from_run_scripts]
default = false
description = "Opt out of parsing task run scripts to infer the usage spec (arguments and flags). When enabled, mise will derive the usage spec only from the `usage` field, ignoring any `arg()`, `option()`, or `flag()` templates used in run scripts. This can restore previous behavior and avoid the extra template pass over run scripts when collecting specs."
docs = """
When enabled, `arg()`, `option()`, and `flag()` Tera functions in run scripts will not contribute
to the task's usage spec—only the explicit `usage` field is used.

This is useful for:
- Skipping the extra template pass over run scripts (performance)
- Avoiding two-pass parsing quirks where template functions return empty strings during spec collection
- Early opt-out before Tera template arguments are removed in 2026.11.0
"""
env = "MISE_TASK_DISABLE_SPEC_FROM_RUN_SCRIPTS"
type = "Bool"

[task.monorepo_depth]
default = 5
description = "Maximum depth to search for task files in monorepo subdirectories."
docs = """
When using monorepo mode (experimental_monorepo_root = true), this controls how deep
mise will search for task files in subdirectories.

**Depth levels:**
- 1 = immediate children only (monorepo_root/projects/)
- 2 = grandchildren (monorepo_root/projects/frontend/)
- 5 = default (5 levels deep)

**Performance tip:** Reduce this value if you have a very large monorepo and notice
slow task discovery. For example, if your projects are all at `projects/*`, set to 2.

**Example:**
```toml
[settings]
task.monorepo_depth = 3  # Only search 3 levels deep
```

Or via environment variable:
```bash
export MISE_TASK_MONOREPO_DEPTH=3
```
"""
env = "MISE_TASK_MONOREPO_DEPTH"
type = "Integer"

[task.monorepo_exclude_dirs]
default = []
description = "Directory patterns to exclude when discovering monorepo subdirectories."
docs = """
If empty (default), uses default exclusions: node_modules, target, dist, build.
If you specify any patterns, ONLY those patterns will be excluded (defaults are NOT included).
For example, setting to [".temp", "vendor"] will exclude only those two directories.
"""
env = "MISE_TASK_MONOREPO_EXCLUDE_DIRS"
parse_env = "list_by_comma"
rust_type = "Vec<String>"
type = "ListString"

[task.monorepo_respect_gitignore]
default = true
description = "Whether to respect .gitignore files when discovering monorepo subdirectories."
docs = """
When enabled, mise will skip directories that are ignored by .gitignore files
when discovering tasks in a monorepo.
"""
env = "MISE_TASK_MONOREPO_RESPECT_GITIGNORE"
type = "Bool"

[task.output]
description = "Change output style when executing tasks."
docs = """
Change output style when executing tasks. This controls the output of `mise run`.
"""
enum = [
  { value = "prefix", description = "(default if jobs > 1) print by line with the prefix of the task name" },
  { value = "interleave", description = "(default if jobs == 1 or all tasks run sequentially) print output as it comes in" },
  { value = "keep-order", description = "stream one task's output live while buffering others, printing in definition order as tasks complete" },
  { value = "replacing", description = "replace stdout each time a line is printed-this uses similar logic as `mise install`" },
  { value = "timed", description = "only show stdout lines that take longer than 1s to complete" },
  { value = "quiet", description = "print only stdout/stderr from tasks and nothing from mise" },
  { value = "silent", description = "print nothing from tasks or mise" },
]
env = "MISE_TASK_OUTPUT"
optional = true
rust_type = "crate::task::TaskOutput"
type = "String"

